<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্য যুক্ত করুন - বন্ধু কল্যাণ সংস্থা</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">বন্ধু কল্যাণ সংস্থা</a>
        <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <i class="fas fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="dashboard.html"><i class="fas fa-home me-1"></i> ড্যাশবোর্ড</a>
                <a class="nav-link" href="list.html">সদস্য তালিকা</a>
                <a class="nav-link" href="payment.html"><i class="fas fa-money-bill-wave me-1"></i> টাকা জমা</a>
                <a class="nav-link" href="search.html"><i class="fas fa-search me-1"></i> অনুসন্ধান</a>
            </div>
        </div>
    </div>
</nav>
<div class="container">
    <div class="card mx-auto" style="max-width: 600px;">
        <h3 class="text-center mb-4">নতুন সদস্য যুক্ত করুন</h3>
        
        <form id="member-form">
            <div class="mb-3">
                <label class="form-label">সদস্যের নাম</label>
                <input type="text" id="name" class="form-control" placeholder="যেমন: রাকিব আল হাসান" required>
            </div>
            <div class="mb-3">
                <label class="form-label">সদস্য আইডি (Member ID)</label>
                <input type="text" id="memberId" class="form-control" placeholder="যেমন: BK-101" required>
            </div>
            <div class="mb-3">
                <label class="form-label">মোবাইল নম্বর</label>
                <input type="tel" id="phone" class="form-control" placeholder="017XXXXXXXX" required>
            </div>
            <div class="mb-3">
             <label class="form-label">লগইন পাসওয়ার্ড (ইংরেজিতে)</label>
             <input type="password" id="password" class="form-control" placeholder="যেমন: 123456" required>
            </div>
            <div class="mb-3">
                <label class="form-label">ঠিকানা</label>
                <textarea id="address" class="form-control" rows="2" placeholder="সদস্যের বর্তমান ঠিকানা"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">প্রাথমিক জমা (টাকা)</label>
                <input type="number" id="deposit" class="form-control" value="0">
            </div>
            
            <button type="submit" id="submit-btn" class="btn btn-primary w-100 text-white">তথ্য সংরক্ষণ করুন</button>
        </form>
        
        <div id="status-message" class="mt-3 text-center"></div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzGNMAyXw-jL45vgN997FTTvk3ddPuZaH_QO3unK-yWggu2BP7V3hb7UY2SWJlkh0jXEg/exec'; // এখানে আপনার Apps Script লিঙ্কটি দিন
    const form = document.getElementById('member-form');
    const statusMsg = document.getElementById('status-message');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        submitBtn.disabled = true;
        statusMsg.innerHTML = "সংরক্ষণ হচ্ছে... দয়া করে অপেক্ষা করুন।";

        // ফর্মের ডাটা সংগ্রহ করা
    const formData = {
    name: document.getElementById('name').value,
    memberId: document.getElementById('memberId').value,
    phone: document.getElementById('phone').value,
    address: document.getElementById('address').value,
    deposit: document.getElementById('deposit').value,
    password: document.getElementById('password').value // নতুন যোগ হলো
    };

        // গুগল শিটে ডাটা পাঠানো
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // এটি গুরুত্বপূর্ণ যাতে ব্রাউজার এরর না দেয়
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(response => {
            statusMsg.innerHTML = "<span class='text-success'>সফলভাবে সংরক্ষিত হয়েছে! আপনার গুগল শিট চেক করুন।</span>";
            form.reset();
            submitBtn.disabled = false;
        })
        .catch(error => {
            statusMsg.innerHTML = "<span class='text-danger'>কিছু একটা সমস্যা হয়েছে। আবার চেষ্টা করুন।</span>";
            submitBtn.disabled = false;
        });
    });
</script>

</body>
</html>
