<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন সদস্য যোগ - বন্ধু কল্যাণ সংস্থা</title>
    <script>
        if (localStorage.getItem('adminLoggedIn') !== 'true') window.location.replace("index.html");
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #084382; --accent: #74dc2c; }
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0f4f8; }
        .form-card { background: white; border-radius: 25px; padding: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); margin-top: 40px; border-top: 6px solid var(--primary); }
        .form-label { font-weight: 700; color: var(--primary); }
        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #ddd; }
        .btn-save { background: var(--primary); color: white; border-radius: 50px; padding: 12px; font-weight: 700; width: 100%; border: none; transition: 0.3s; }
        .btn-save:hover { background: #1b9cfc; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="form-card">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-primary">নতুন সদস্য ফরম</h3>
                    <p class="text-muted">সদস্যের সঠিক তথ্য প্রদান করুন</p>
                </div>

                <form id="addMemberForm">
                    <div class="mb-3">
                        <label class="form-label">সদস্যের নাম</label>
                        <input type="text" name="name" class="form-control" placeholder="পুরো নাম লিখুন" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">সদস্য আইডি (Member ID)</label>
                        <input type="number" name="memberId" class="form-control" placeholder="ইউনিক আইডি দিন" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">মোবাইল নম্বর</label>
                        <input type="text" name="phone" class="form-control" placeholder="০১XXXXXXXXX" required pattern="[0-9]{11}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">লগইন পাসওয়ার্ড</label>
                        <input type="text" name="password" class="form-control" placeholder="গোপন পাসওয়ার্ড দিন" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ঠিকানা</label>
                        <textarea name="address" class="form-control" rows="2" placeholder="বর্তমান ঠিকানা"></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">প্রাথমিক জমা (৳)</label>
                        <input type="number" name="deposit" class="form-control" value="0">
                    </div>

                    <button type="submit" class="btn-save shadow" id="submitBtn">সদস্য যোগ করুন</button>
                    <a href="dashboard.html" class="btn btn-link w-100 mt-2 text-decoration-none text-muted">ফিরে যান</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz2lZ6KwOU2ek7Kyk7E1ugj1hAnNpeoG3ti0eBAl5QoIHWGYY1r21_8UVoQ8yCfpXa1-Q/exec';
    
    document.getElementById('addMemberForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "সেভ হচ্ছে...";

        const formData = new FormData(this);
        formData.append('action', 'addMember'); // Apps Script-এ এই অ্যাকশন হ্যান্ডেল করতে হবে

        fetch(scriptURL, { method: 'POST', body: formData })
        .then(response => {
            alert("সদস্য সফলভাবে যোগ করা হয়েছে!");
            this.reset();
            btn.disabled = false;
            btn.innerText = "সদস্য যোগ করুন";
        })
        .catch(error => {
            alert("ত্রুটি হয়েছে! আবার চেষ্টা করুন।");
            btn.disabled = false;
        });
    });
</script>
</body>
</html>
