<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>হোম - বন্ধু কল্যাণ সংস্থা</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background: #f4f7f6; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* হেডার স্টাইল */
        .hero-section {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .org-logo {
            width: 110px;
            height: 110px;
            background: white;
            padding: 8px;
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* বাটন কার্ড স্টাইল */
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 40px 20px;
        }
        .choice-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid #eee;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .choice-card:hover {
            transform: translateX(10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            border-color: #1e3c72;
        }
        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 20px;
        }
        .admin-bg { background: #fff5f5; color: #e53e3e; }
        .member-bg { background: #f0fff4; color: #38a169; }
        
        .choice-text h5 { margin: 0; font-weight: 700; color: #2d3748; }
        .choice-text p { margin: 0; color: #718096; font-size: 14px; }

        footer {
            text-align: center;
            padding: 20px;
            color: #a0aec0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="container">
            <img src="https://lh3.googleusercontent.com/d/1-zvnNiBAR3arEWlegDh_WP1NELCm--X2" alt="Logo" class="org-logo">
            <h1 class="fw-bold">বন্ধু কল্যাণ সংস্থা</h1>
            <p class="opacity-75">সদস্যদের সেবায় ডিজিটাল ম্যানেজমেন্ট সিস্টেম</p>
        </div>
    </div>

    <div class="main-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    
                    <a href="login.html" class="choice-card">
                        <div class="icon-box admin-bg">
                            <i class="fas fa-user-shield"></i>
                        </div>
                        <div class="choice-text">
                            <h5>অ্যাডমিন লগইন</h5>
                            <p>সদস্য যোগ ও টাকা জমা পরিচালনা করুন</p>
                        </div>
                        <i class="fas fa-chevron-right ms-auto text-muted"></i>
                    </a>

                    <a href="member-login.html" class="choice-card">
                        <div class="icon-box member-bg">
                            <i class="fas fa-user-circle"></i>
                        </div>
                        <div class="choice-text">
                            <h5>সদস্য লগইন</h5>
                            <p>আপনার প্রোফাইল ও জমার হিসাব দেখুন</p>
                        </div>
                        <i class="fas fa-chevron-right ms-auto text-muted"></i>
                    </a>

                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© ২০২৬ বন্ধু কল্যাণ সংস্থা | সর্বস্বত্ব সংরক্ষিত</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
