<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>টাকা জমা ও রিসিট - বন্ধু কল্যাণ সংস্থা</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f2f5; }
        .payment-card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* প্রিন্ট রিসিট ডিজাইন (শুধুমাত্র প্রিন্টে দেখা যাবে) */
        #receipt-section { display: none; }
        
        @media print {
            body * { visibility: hidden; }
            #receipt-section, #receipt-section * { visibility: visible; }
            #receipt-section { 
                display: block !important; 
                position: absolute; 
                left: 0; top: 0; width: 100%; 
                padding: 20px; border: 1px solid #000;
            }
            .no-print { display: none !important; }
        }

        .receipt-box {
            border: 2px solid #2c3e50;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            margin: 20px auto;
            background: #fff;
        }
        .receipt-header { border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        
        /* সাজেশন ডিজাইন */
        #suggestion-box {
            position: absolute; z-index: 1000; width: 100%;
            background: white; border: 1px solid #ddd; display: none;
            max-height: 150px; overflow-y: auto; border-radius: 0 0 10px 10px;
        }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .suggestion-item:hover { background: #f8f9fa; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4 no-print">
    <div class="container"><a class="navbar-brand" href="dashboard.html">বন্ধু কল্যাণ সংস্থা</a></div>
</nav>

<div class="container no-print">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card payment-card p-4">
                <h3 class="text-center mb-4"><i class="fas fa-money-check-alt text-success me-2"></i>টাকা জমা নিন</h3>
                <form id="payment-form">
                    <div class="mb-3 position-relative">
                        <label class="form-label fw-bold">সদস্য আইডি</label>
                        <input type="text" id="mId" class="form-control" placeholder="BK-101" autocomplete="off" required>
                        <div id="suggestion-box"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">টাকার পরিমাণ</label>
                        <input type="number" id="mAmount" class="form-control" placeholder="৳ 0.00" required>
                    </div>
                    <button type="submit" id="submitBtn" class="btn btn-success w-100 py-2 fw-bold">জমা করুন ও রিসিট দেখুন</button>
                </form>
                <div id="status" class="mt-3 text-center"></div>
            </div>
        </div>
    </div>
</div>

<div id="receipt-section">
    <div class="receipt-box">
        <div class="receipt-header text-center">
            <h2 class="fw-bold mb-0">বন্ধু কল্যাণ সংস্থা</h2>
            <p class="mb-0 text-muted">টাকা জমার রশিদ</p>
        </div>
        <div class="receipt-body">
            <p><strong>তারিখ:</strong> <span id="r-date"></span></p>
            <p><strong>রিসিট নং:</strong> <span id="r-no"></span></p>
            <hr>
            <p><strong>সদস্যের নাম:</strong> <span id="r-name"></span></p>
            <p><strong>সদস্য আইডি:</strong> <span id="r-id"></span></p>
            <p><strong>জমার পরিমাণ:</strong> <span class="fw-bold fs-4">৳ <span id="r-amount"></span></span></p>
        </div>
        <div class="receipt-footer mt-5 pt-3 d-flex justify-content-between">
            <div class="text-center" style="width: 120px; border-top: 1px solid #000;">সদস্যের স্বাক্ষর</div>
            <div class="text-center" style="width: 120px; border-top: 1px solid #000;">কর্তৃপক্ষের স্বাক্ষর</div>
        </div>
        <div class="text-center mt-4 no-print">
            <button onclick="window.print()" class="btn btn-primary btn-sm"><i class="fas fa-print me-2"></i>প্রিন্ট করুন</button>
            <button onclick="location.reload()" class="btn btn-secondary btn-sm">নতুন জমা</button>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzGNMAyXw-jL45vgN997FTTvk3ddPuZaH_QO3unK-yWggu2BP7V3hb7UY2SWJlkh0jXEg/exec'; 
    let members = [];

    // মেম্বার লিস্ট লোড করা সাজেশনের জন্য
    window.onload = function() {
        fetch(scriptURL).then(res => res.json()).then(data => members = data);
    }

    const mInput = document.getElementById('mId');
    const sBox = document.getElementById('suggestion-box');

    mInput.oninput = function() {
        const val = this.value.toLowerCase();
        sBox.innerHTML = '';
        if(val) {
            const match = members.filter(m => String(m.memberId).toLowerCase().includes(val));
            match.forEach(m => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerText = m.memberId + " - " + m.name;
                div.onclick = () => { mInput.value = m.memberId; sBox.style.display = 'none'; };
                sBox.appendChild(div);
            });
            sBox.style.display = match.length ? 'block' : 'none';
        } else { sBox.style.display = 'none'; }
    }

    document.getElementById('payment-form').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const id = mInput.value;
        const amt = document.getElementById('mAmount').value;
        const member = members.find(m => m.memberId == id);

        if(!member) return alert("সদস্য পাওয়া যায়নি!");

        btn.disabled = true;
        btn.innerText = "জমা হচ্ছে...";

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: "updateDeposit", memberId: id, amount: amt })
        }).then(() => {
            // রিসিটে ডাটা বসানো
            document.getElementById('r-date').innerText = new Date().toLocaleDateString('bn-BD');
            document.getElementById('r-no').innerText = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('r-name').innerText = member.name;
            document.getElementById('r-id').innerText = id;
            document.getElementById('r-amount').innerText = amt;

            // ফর্ম লুকানো এবং রিসিট দেখানো
            document.querySelector('.no-print.container').style.display = 'none';
            document.getElementById('receipt-section').style.display = 'block';
        });
    }
</script>
</body>
</html>
