<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>টাকা জমা নিন - বন্ধু কল্যাণ সংস্থা</title>
    <script>
        if (localStorage.getItem('adminLoggedIn') !== 'true') window.location.replace("index.html");
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #084382; --success: #28a745; }
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f4f7f6; }
        .payment-card { background: white; border-radius: 25px; padding: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); margin-top: 40px; border-top: 6px solid var(--success); }
        .member-info-box { background: #f8f9fa; border-radius: 15px; padding: 15px; border-left: 5px solid var(--primary); display: none; }
        .btn-pay { background: var(--success); color: white; border-radius: 50px; padding: 12px; font-weight: 700; width: 100%; border: none; transition: 0.3s; }
        .btn-pay:hover { background: #218838; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="payment-card">
                <h3 class="fw-bold text-center text-success mb-4">টাকা জমা গ্রহণ</h3>
                
                <div class="mb-4">
                    <label class="fw-bold mb-2">সদস্য আইডি দিয়ে খুঁজুন</label>
                    <div class="input-group">
                        <input type="number" id="searchID" class="form-control rounded-start-pill" placeholder="আইডি লিখুন...">
                        <button onclick="findMember()" class="btn btn-primary rounded-end-pill px-4">খুঁজুন</button>
                    </div>
                </div>

                <div id="infoBox" class="member-info-box mb-4">
                    <h5 id="mName" class="fw-bold text-dark mb-1">সদস্যের নাম</h5>
                    <p class="mb-0 text-muted">বর্তমান জমা: ৳ <span id="mCurrent">0</span></p>
                </div>

                <form id="paymentForm">
                    <input type="hidden" id="memberId" name="memberId">
                    <div class="mb-4">
                        <label class="form-label fw-bold">জমার পরিমাণ (৳)</label>
                        <input type="number" name="amount" id="amount" class="form-control form-control-lg rounded-3" placeholder="টাকার অংক লিখুন" required>
                    </div>
                    <button type="submit" id="payBtn" class="btn-pay shadow" disabled>জমা নিশ্চিত করুন</button>
                </form>
                <div class="text-center mt-3">
                    <a href="dashboard.html" class="text-decoration-none text-muted small">ড্যাশবোর্ডে ফিরে যান</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycby-laXDPDG5io4Jitg6cgBrS6jZ5jhHdne-VbNxPalAldjki8J-clh62KmHU1Xw3jS1hA/exec';
    
    async function findMember() {
        const id = document.getElementById('searchID').value;
        if(!id) return;
        
        const response = await fetch(scriptURL);
        const members = await response.json();
        const member = members.find(m => m.memberId == id);
        
        if(member) {
            document.getElementById('mName').innerText = member.name;
            document.getElementById('mCurrent').innerText = member.deposit;
            document.getElementById('memberId').value = member.memberId;
            document.getElementById('infoBox').style.display = 'block';
            document.getElementById('payBtn').disabled = false;
        } else {
            alert("সদস্য পাওয়া যায়নি!");
            document.getElementById('infoBox').style.display = 'none';
            document.getElementById('payBtn').disabled = true;
        }
    }

    document.getElementById('paymentForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('payBtn');
        btn.innerText = "প্রসেসিং...";
        btn.disabled = true;

        const fd = new FormData(this);
        fd.append('action', 'addPayment');

        fetch(scriptURL, { method: 'POST', body: fd })
        .then(() => {
            alert("টাকা সফলভাবে জমা হয়েছে এবং তারিখ আপডেট হয়েছে!");
            location.reload();
        })
        .catch(() => alert("ত্রুটি হয়েছে!"));
    };
</script>
</body>
</html>
