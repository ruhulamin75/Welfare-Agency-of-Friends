<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্য লগইন - বন্ধু কল্যাণ সংস্থা</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: white; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; padding: 40px 30px; text-align: center; }
        .org-logo { width: 90px; height: 90px; object-fit: contain; margin-bottom: 15px; border-radius: 50%; background: #fff; padding: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .form-label { font-weight: 600; color: #444; display: block; text-align: left; }
        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #ddd; margin-bottom: 20px; }
        .btn-login { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; border: none; border-radius: 12px; padding: 12px; width: 100%; font-weight: 700; transition: 0.3s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(30, 60, 114, 0.2); }
        #msg { margin-top: 15px; font-weight: 600; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://lh3.googleusercontent.com/d/1-zvnNiBAR3arEWlegDh_WP1NELCm--X2" alt="Logo" class="org-logo">
    <h3 class="fw-bold text-primary mb-1">বন্ধু কল্যাণ সংস্থা</h3>
    <p class="text-muted mb-4 small">সদস্য প্যানেলে লগইন করুন</p>

    <form id="member-login-form">
        <div class="text-start">
            <label class="form-label"><i class="fas fa-phone-alt me-2 text-primary"></i>মোবাইল নম্বর</label>
            <input type="text" id="phone" class="form-control" placeholder="017XXXXXXXX" required>
        </div>
        <div class="text-start">
            <label class="form-label"><i class="fas fa-lock me-2 text-primary"></i>পাসওয়ার্ড</label>
            <input type="password" id="password" class="form-control" placeholder="****" required>
        </div>
        <button type="submit" id="submitBtn" class="btn btn-login">প্রবেশ করুন</button>
    </form>

    <div id="msg"></div>
    <a href="index.html" class="mt-3 d-block text-muted small text-decoration-none">← হোম পেজে ফিরে যান</a>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzGNMAyXw-jL45vgN997FTTvk3ddPuZaH_QO3unK-yWggu2BP7V3hb7UY2SWJlkh0jXEg/exec'; 

    document.getElementById('member-login-form').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('msg');
        const phone = document.getElementById('phone').value.trim();
        const pass = document.getElementById('password').value.trim();

        btn.disabled = true;
        btn.innerHTML = 'যাচাই হচ্ছে...';
        msg.innerHTML = "";

        // আপনার আগের স্ক্রিপ্ট ফরম্যাট অনুযায়ী ফেচ (Fetch)
        fetch(scriptURL + "?action=login&phone=" + phone + "&pass=" + pass)
        .then(res => res.json())
        .then(response => {
            // এখানে response.data এর বদলে আপনার আগের স্ক্রিপ্ট অনুযায়ী response.member ব্যবহার করা হয়েছে
            if(response.status === "success") {
                const memberInfo = response.member || response.data; // দুইটাই চেক করবে যেন ভুল না হয়
                localStorage.setItem('loggedInMember', JSON.stringify(memberInfo));
                msg.innerHTML = '<span class="text-success">সফল হয়েছে!</span>';
                
                setTimeout(() => {
                    window.location.href = "member-profile.html"; 
                }, 1000);
            } else {
                msg.innerHTML = '<span class="text-danger">মোবাইল নম্বর বা পাসওয়ার্ড ভুল!</span>';
                btn.disabled = false;
                btn.innerHTML = 'প্রবেশ করুন';
            }
        })
        .catch(err => {
            msg.innerHTML = '<span class="text-danger">সার্ভার সমস্যা!</span>';
            btn.disabled = false;
            btn.innerHTML = 'প্রবেশ করুন';
        });
    };
</script>

</body>
</html>
