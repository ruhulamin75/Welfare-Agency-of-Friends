<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্য লগইন - বন্ধু কল্যাণ সংস্থা</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: white; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; padding: 40px 30px; text-align: center; border: 1px solid #eee; }
        .org-logo { width: 90px; height: 90px; object-fit: contain; margin-bottom: 15px; border-radius: 50%; background: #fff; padding: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .form-label { font-weight: 600; color: #444; display: block; text-align: left; }
        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #ddd; margin-bottom: 20px; }
        .btn-login { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; border: none; border-radius: 12px; padding: 12px; width: 100%; font-weight: 700; transition: 0.3s; }
        .btn-login:hover { opacity: 0.9; transform: translateY(-2px); }
        #msg { margin-top: 15px; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://lh3.googleusercontent.com/d/1-zvnNiBAR3arEWlegDh_WP1NELCm--X2" alt="Logo" class="org-logo">
    <h3 class="fw-bold text-primary mb-1">বন্ধু কল্যাণ সংস্থা</h3>
    <p class="text-muted mb-4 small">সদস্য লগইন</p>

    <form id="member-login-form">
        <div class="text-start">
            <label class="form-label"><i class="fas fa-phone-alt me-2 text-primary"></i>মোবাইল নম্বর</label>
            <input type="text" id="phone" name="phone" class="form-control" placeholder="017XXXXXXXX" required>
        </div>
        <div class="text-start">
            <label class="form-label"><i class="fas fa-lock me-2 text-primary"></i>পাসওয়ার্ড</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="****" required>
        </div>
        <button type="submit" id="submitBtn" class="btn btn-login">লগইন করুন</button>
    </form>

    <div id="msg"></div>
    <a href="index.html" class="mt-4 d-block text-muted small text-decoration-none">← হোম পেজে ফিরে যান</a>
</div>

<script>
    // আপনার সঠিক স্ক্রিপ্ট লিঙ্কটি এখানে নিশ্চিত করুন
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzGNMAyXw-jL45vgN997FTTvk3ddPuZaH_QO3unK-yWggu2BP7V3hb7UY2SWJlkh0jXEg/exec'; 

    document.getElementById('member-login-form').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('msg');
        const phone = document.getElementById('phone').value.trim();
        const pass = document.getElementById('password').value.trim();

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>যাচাই হচ্ছে...';
        msg.innerHTML = "";

        // ব্রাউজারে ডাটা পাঠানোর সময় URL কনস্ট্রাকশন
        const finalURL = `${scriptURL}?action=login&phone=${encodeURIComponent(phone)}&pass=${encodeURIComponent(pass)}`;

        fetch(finalURL)
        .then(res => res.json())
        .then(response => {
            console.log(response); // কনসোলে ডাটা চেক করার জন্য

            if(response.status === "success" || response.status === "Success") {
                // ডাটা যে নামেই আসুক (member বা data), এটি তা সেভ করবে
                const memberData = response.member || response.data || response.user;
                
                if(memberData) {
                    localStorage.setItem('loggedInMember', JSON.stringify(memberData));
                    msg.innerHTML = '<span class="text-success">সফল হয়েছে! লোড হচ্ছে...</span>';
                    
                    setTimeout(() => {
                        window.location.href = "member-profile.html"; 
                    }, 1000);
                } else {
                    msg.innerHTML = '<span class="text-danger">ডাটা খুঁজে পাওয়া যায়নি!</span>';
                    btn.disabled = false;
                }
            } else {
                msg.innerHTML = '<span class="text-danger">মোবাইল নম্বর বা পাসওয়ার্ড ভুল!</span>';
                btn.disabled = false;
                btn.innerHTML = 'লগইন করুন';
            }
        })
        .catch(err => {
            console.error(err);
            msg.innerHTML = '<span class="text-danger">সার্ভার সমস্যা! আবার চেষ্টা করুন।</span>';
            btn.disabled = false;
            btn.innerHTML = 'লগইন করুন';
        });
    };
</script>

</body>
</html>
