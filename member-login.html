<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্য প্রবেশ - বন্ধু কল্যাণ সংস্থা</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
        }
        .login-card { 
            border: none; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            background: #fff;
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }
        .card-header-bg {
            background: #2c3e50;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .login-icon {
            font-size: 50px;
            color: #f1c40f;
            margin-bottom: 10px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #2c3e50;
        }
        .btn-login { 
            background: #2c3e50; 
            color: white;
            border: none; 
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-login:hover { 
            background: #1a252f; 
            color: #fff;
            transform: translateY(-2px);
        }
        .fw-bold { font-weight: 600 !important; }
        #msg { min-height: 24px; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card login-card">
        <div class="card-header-bg">
            <i class="fas fa-user-circle login-icon"></i>
            <h3 class="mb-0 fw-bold">সদস্য লগইন</h3>
            <p class="small mb-0 opacity-75">আপনার একাউন্টে প্রবেশ করুন</p>
        </div>
        
        <div class="card-body p-4">
            <form id="member-login-form">
                <div class="mb-3">
                    <label class="form-label fw-bold"><i class="fas fa-phone-alt me-2"></i>মোবাইল নম্বর</label>
                    <input type="tel" id="mPhone" class="form-control" placeholder="017XXXXXXXX" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold"><i class="fas fa-lock me-2"></i>পাসওয়ার্ড</label>
                    <input type="password" id="mPass" class="form-control" placeholder="******" required>
                </div>
                <button type="submit" id="loginBtn" class="btn btn-login w-100 shadow-sm">প্রবেশ করুন</button>
            </form>
            <div id="msg" class="mt-3 text-center text-danger fw-bold small"></div>
        </div>
    </div>
</div>

<script>
    // আপনার লেটেস্ট অ্যাপস স্ক্রিপ্ট লিঙ্কটি এখানে বসান
    const scriptURL = 'https://script.google.com/macros/s/AKfycby-laXDPDG5io4Jitg6cgBrS6jZ5jhHdne-VbNxPalAldjki8J-clh62KmHU1Xw3jS1hA/exec'; 

    document.getElementById('member-login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const status = document.getElementById('msg');
        
        btn.disabled = true;
        status.innerHTML = "<i class='fas fa-spinner fa-spin me-2'></i>যাচাই করা হচ্ছে...";

        const loginData = {
            action: "memberLogin",
            phone: document.getElementById('mPhone').value,
            password: document.getElementById('mPass').value
        };

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify(loginData)
        })
        .then(res => res.json())
        .then(data => {
            if (data && data.memberId) {
                // সফল হলে ডাটা সেভ করে প্রোফাইলে পাঠানো
                localStorage.setItem('loggedInMember', JSON.stringify(data));
                window.location.href = "member-profile.html";
            } else {
                status.innerHTML = "<i class='fas fa-exclamation-circle me-1'></i>ভুল মোবাইল নম্বর বা পাসওয়ার্ড!";
                btn.disabled = false;
            }
        })
        .catch(err => {
            status.innerHTML = "<i class='fas fa-wifi me-1'></i>সার্ভার সমস্যা! ইন্টারনেট চেক করুন।";
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
