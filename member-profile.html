<script>
    window.onload = function() {
        const data = JSON.parse(localStorage.getItem('loggedInMember'));
        if (data) {
            document.getElementById('mName').innerText = data.name || "সদস্য";
            document.getElementById('mId').innerText = data.memberId || "--";
            document.getElementById('mPhone').innerText = data.phone || "--";
            document.getElementById('mDeposit').innerText = data.deposit || "0";
            document.getElementById('mAddress').innerText = data.address || "ঠিকানা নেই";

            // Last Date সাপোর্ট
            let rawDate = data['Last Date'] || "তথ্য নেই";
            if (rawDate !== "তথ্য নেই") {
                let dateObj = new Date(rawDate);
                if (!isNaN(dateObj)) {
                    rawDate = dateObj.toLocaleDateString('bn-BD', {day:'numeric', month:'long', year:'numeric'});
                }
            }
            document.getElementById('mLastDate').innerText = rawDate;
        }
    };
    function memberLogout() {
        localStorage.clear();
        window.location.replace("index.html");
    }
</script>
