<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্য প্রোফাইল - বন্ধু কল্যাণ সংস্থা</title>

    <script>
        // ১. লগইন চেক: লগইন না থাকলে সরাসরি হোমপেজে পাঠিয়ে দেবে
        const memberData = JSON.parse(localStorage.getItem('loggedInMember'));
        if (!memberData) {
            window.location.replace("index.html");
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #084382; --accent: #74dc2c; }
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f4f7f6; margin: 0; }
        
        /* প্রোফাইল হেডার */
        .profile-header {
            background: linear-gradient(135deg, var(--primary) 0%, #1b9cfc 100%);
            color: white; padding: 60px 20px; text-align: center;
            border-bottom-left-radius: 50px; border-bottom-right-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .brand-logo-profile {
            height: 60px; background: white; padding: 5px;
            border-radius: 12px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* তথ্য কার্ড */
        .info-card {
            background: white; border-radius: 30px; padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08); margin-top: -40px;
            border-bottom: 8px solid var(--accent);
        }

        .balance-box {
            background: #f1fcf0; border-radius: 20px; padding: 25px;
            text-align: center; border: 2px dashed var(--accent); margin-bottom: 30px;
        }

        .label-text { font-size: 0.85rem; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .value-text { font-size: 1.15rem; font-weight: 700; color: #333; margin-top: 5px; }
        
        .logout-btn {
            background: #fff; color: #e74c3c; border: 2px solid #e74c3c;
            border-radius: 50px; padding: 12px 35px; font-weight: 700;
            transition: 0.3s; margin-top: 40px; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.1);
        }
        .logout-btn:hover { background: #e74c3c; color: white; transform: translateY(-3px); }
    </style>
</head>
<body>

<div class="profile-header">
    <div class="container">
        <img src="https://drive.google.com/uc?export=view&id=1-zvnNiBAR3arEWlegDh_WP1NELCm--X2" alt="Logo" class="brand-logo-profile">
        <h2 class="fw-bold">বন্ধু কল্যাণ সংস্থা</h2>
        <p class="opacity-75">স্বাগতম, আপনার সঞ্চয় হিসাব দেখুন</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="info-card">
                <div class="balance-box">
                    <p class="label-text mb-1 text-success">আপনার মোট জমাকৃত টাকা</p>
                    <h1 class="fw-bold text-success mb-0" style="font-size: 3rem;">৳ <span id="mDeposit">0</span></h1>
                </div>

                <div class="row g-4">
                    <div class="col-12 text-center mb-3">
                        <h3 id="mName" class="fw-bold text-dark mb-1">সদস্যের নাম</h3>
                        <span class="badge bg-primary rounded-pill px-4 py-2">আইডি: <span id="mId">--</span></span>
                    </div>

                    <div class="col-6 col-md-6 border-end">
                        <p class="label-text">মোবাইল নম্বর</p>
                        <p id="mPhone" class="value-text text-primary">--</p>
                    </div>
                    <div class="col-6 col-md-6">
                        <p class="label-text">শেষ জমার তারিখ</p>
                        <p id="mLastDate" class="value-text">--</p>
                    </div>
                    
                    <hr class="opacity-10 my-4">
                    
                    <div class="col-12 px-4">
                        <p class="label-text"><i class="fas fa-map-marker-alt me-2 text-primary"></i>বর্তমান ঠিকানা</p>
                        <p id="mAddress" class="value-text" style="font-size: 1rem;">ঠিকানা পাওয়া যায়নি</p>
                    </div>
                </div>
            </div>

            <div class="text-center">
                <button class="logout-btn" onclick="memberLogout()">
                    <i class="fas fa-sign-out-alt me-2"></i> লগআউট করুন
                </button>
            </div>
        </div>
    </div>
    
    <p class="text-center mt-5 text-muted small">© ২০২৬ বন্ধু কল্যাণ সংস্থা | সর্বস্বত্ব সংরক্ষিত</p>
</div>

<script>
    // ডাটা রেন্ডারিং
    window.onload = function() {
        const data = JSON.parse(localStorage.getItem('loggedInMember'));

        if (data) {
            document.getElementById('mName').innerText = data.name || "সদস্য";
            document.getElementById('mId').innerText = data.memberId || "--";
            document.getElementById('mDeposit').innerText = data.deposit || "0";
            document.getElementById('mAddress').innerText = data.address || "ঠিকানা পাওয়া যায়নি";

            // ১. মোবাইল নম্বরে শুরুর '0' প্রোটেকশন
            let phone = data.phone.toString();
            if (phone.length === 10) phone = "0" + phone;
            document.getElementById('mPhone').innerText = phone;

            // ২. তারিখ বাংলা ফরম্যাটে রূপান্তর (Last Date কলাম অনুযায়ী)
            let rawDate = data['Last Date'] || "তথ্য নেই";
            if (rawDate !== "তথ্য নেই") {
                const dateObj = new Date(rawDate);
                if (!isNaN(dateObj)) {
                    // তারিখ ফরম্যাট: ২৮ মার্চ ২০২৬
                    const options = { day: 'numeric', month: 'long', year: 'numeric' };
                    rawDate = dateObj.toLocaleDateString('bn-BD', options);
                }
            }
            document.getElementById('mLastDate').innerText = rawDate;
        }
    };

    // লগআউট ফাংশন
    function memberLogout() {
        if (confirm("আপনি কি নিশ্চিতভাবে লগআউট করতে চান?")) {
            localStorage.clear();
            window.location.replace("index.html");
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
