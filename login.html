<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন - বন্ধু কল্যাণ সংস্থা</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card text-center" style="width: 100%; max-width: 400px;">
        <h3 class="mb-2">বন্ধু কল্যাণ সংস্থা</h3>
        <p class="text-muted mb-4">অ্যাডমিন প্যানেলে লগইন করুন</p>
        
        <form id="login-form">
            <div class="mb-3 text-start">
                <label class="form-label">ইমেইল আইডি</label>
                <input type="email" id="email" class="form-control" placeholder="আপনার ইমেইল" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label">পাসওয়ার্ড</label>
                <input type="password" id="password" class="form-control" placeholder="******" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 text-white">প্রবেশ করুন</button>
        </form>
        
        <div id="error-message" class="mt-3 text-danger small"></div>
    </div>
</div>
<script type="module">
  // ফায়ারবেস অ্যাপ এবং অথেনটিকেশন ইমপোর্ট করা
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // আপনার ফায়ারবেস কনফিগারেশন (এখানে আপনার নিজের তথ্যগুলো বসান)
  const firebaseConfig = {
  apiKey: "AIzaSyD9geYhKoJMHzn0K5R5JawJiAQ3PkJX0-c",
  authDomain: "welfare-agency-of-friends.firebaseapp.com",
  projectId: "welfare-agency-of-friends",
  storageBucket: "welfare-agency-of-friends.firebasestorage.app",
  messagingSenderId: "232183840019",
  appId: "1:232183840019:web:bb6bf500e98a9137a92ee6",
  measurementId: "G-B6MJ6S2S95"
};

  // ফায়ারবেস ইনিশিয়ালাইজ করা
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // লগইন ফর্ম সাবমিট হ্যান্ডেল করা
  const loginForm = document.getElementById('login-form');
  const errorMessage = document.getElementById('error-message');

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault(); // পেজ রিলোড বন্ধ করা

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    // ফায়ারবেস দিয়ে লগইন চেক করা
    signInWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        // লগইন সফল হলে ড্যাশবোর্ড বা ইনডেক্স পেজে পাঠিয়ে দেওয়া
        alert("সফলভাবে লগইন হয়েছে!");
        window.location.href = "dashboard.html"; 
      })
      .catch((error) => {
        // ভুল ইমেইল বা পাসওয়ার্ড দিলে মেসেজ দেখানো
        errorMessage.innerText = "ভুল ইমেইল অথবা পাসওয়ার্ড! আবার চেষ্টা করুন।";
      });
  });
</script>
</body>
</html>
