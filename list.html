<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>সদস্য তালিকা - বন্ধু কল্যাণ সংস্থা</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f4f8; }
        .main-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: none; overflow: hidden; }
        .table thead { background-color: #084382; color: white; }
        .table thead th { padding: 18px; font-weight: 600; border: none; }
        .table tbody td { padding: 15px 18px; vertical-align: middle; border-bottom: 1px solid #eee; }
        .btn-action { width: 40px; height: 40px; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-bold text-primary mb-0"><i class="fas fa-users me-3"></i>সকল সদস্যের তালিকা</h2>
        <a href="dashboard.html" class="btn btn-dark rounded-pill px-4 shadow-sm"><i class="fas fa-arrow-left me-2"></i>ড্যাশবোর্ড</a>
    </div>

    <div class="main-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>আইডি</th>
                        <th>সদস্যের নাম</th>
                        <th>মোবাইল নম্বর</th>
                        <th>জমাকৃত টাকা</th>
                        <th class="text-center">কার্যক্রম (অ্যাকশন)</th>
                    </tr>
                </thead>
                <tbody id="memberTableBody">
                    <tr><td colspan="5" class="text-center py-5"><div class="spinner-border text-primary" role="status"></div><br><br>ডাটা লোড হচ্ছে...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz2lZ6KwOU2ek7Kyk7E1ugj1hAnNpeoG3ti0eBAl5QoIHWGYY1r21_8UVoQ8yCfpXa1-Q/exec';

    async function loadMembers() {
        try {
            const response = await fetch(scriptURL);
            const members = await response.json();
            const tbody = document.getElementById('memberTableBody');
            tbody.innerHTML = '';

            members.forEach(m => {
                tbody.innerHTML += `
                    <tr>
                        <td class="fw-bold text-primary">#${m.memberId}</td>
                        <td><div class="fw-bold">${m.name}</div><small class="text-muted">${m.address || ''}</small></td>
                        <td>${m.phone}</td>
                        <td class="fw-bold text-success">৳ ${m.deposit}</td>
                        <td class="text-center">
                            <a href="edit.html?id=${m.memberId}" class="btn btn-primary btn-action me-2 shadow-sm" title="এডিট"><i class="fas fa-edit"></i></a>
                            <button onclick="deleteMember('${m.memberId}')" class="btn btn-danger btn-action shadow-sm" title="ডিলিট"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `;
            });
        } catch (e) { alert("ডাটা লোড করতে ব্যর্থ!"); }
    }

    function deleteMember(id) {
        if(confirm("আপনি কি নিশ্চিতভাবে এই সদস্যকে ডিলিট করতে চান?")) {
            alert("ডিলিট রিকোয়েস্ট পাঠানো হয়েছে আইডি: " + id);
        }
    }

    window.onload = loadMembers;
</script>
</body>
</html>
