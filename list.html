<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্য তালিকা - বন্ধু কল্যাণ সংস্থা</title>
    
    <script>
        if (localStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.replace("index.html");
        }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f4f8; }
        .main-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: none; overflow: hidden; margin-top: 20px; }
        .table thead { background-color: #084382; color: white; }
        .table thead th { padding: 18px; font-weight: 600; border: none; }
        .table tbody td { padding: 15px 18px; vertical-align: middle; border-bottom: 1px solid #eee; }
        .btn-action { width: 38px; height: 38px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; transition: 0.3s; border: none; }
        .modal-content { border-radius: 25px; border: none; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary"><i class="fas fa-users-list me-2"></i>সদস্য তালিকা</h2>
        <a href="dashboard.html" class="btn btn-dark rounded-pill px-4 shadow-sm">ড্যাশবোর্ড</a>
    </div>

    <div class="main-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th class="ps-4">আইডি</th>
                        <th>নাম</th>
                        <th>মোবাইল নম্বর</th>
                        <th>মোট জমা</th>
                        <th class="text-center">অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody id="memberTableBody">
                    <tr><td colspan="5" class="text-center py-5"><div class="spinner-border text-primary"></div><br>ডাটা লোড হচ্ছে...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h4 class="modal-title fw-bold text-primary">তথ্য সংশোধন</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="editForm">
                    <input type="hidden" id="editId" name="memberId">
                    <div class="mb-3">
                        <label class="form-label fw-bold">সদস্যের নাম</label>
                        <input type="text" id="editName" name="name" class="form-control rounded-3" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">মোবাইল নম্বর (১১ ডিজিট)</label>
                        <input type="text" id="editPhone" name="phone" class="form-control rounded-3" required pattern="[0-9]{11}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">পাসওয়ার্ড</label>
                        <input type="text" id="editPass" name="password" class="form-control rounded-3" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">ঠিকানা</label>
                        <textarea id="editAddress" name="address" class="form-control rounded-3" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow" id="saveBtn">আপডেট করুন</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycby-laXDPDG5io4Jitg6cgBrS6jZ5jhHdne-VbNxPalAldjki8J-clh62KmHU1Xw3jS1hA/exec';
    let allMembers = [];

    // ডাটা লোড করা
    async function loadMembers() {
        try {
            const response = await fetch(scriptURL);
            allMembers = await response.json();
            const tbody = document.getElementById('memberTableBody');
            tbody.innerHTML = '';

            allMembers.forEach(m => {
                // মোবাইল নম্বরটি টেক্সট হিসেবে নিয়ে ০ নিশ্চিত করা
                let phoneDisplay = m.phone.toString();
                if (phoneDisplay.length === 10) phoneDisplay = "0" + phoneDisplay;

                tbody.innerHTML += `
                    <tr>
                        <td class="ps-4 fw-bold">#${m.memberId}</td>
                        <td class="fw-bold">${m.name}</td>
                        <td>${phoneDisplay}</td>
                        <td class="text-success fw-bold">৳ ${m.deposit}</td>
                        <td class="text-center">
                            <button onclick="openEditModal('${m.memberId}')" class="btn-action btn-primary me-2 shadow-sm"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteMember('${m.memberId}')" class="btn-action btn-danger shadow-sm"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>`;
            });
        } catch (e) {
            document.getElementById('memberTableBody').innerHTML = '<tr><td colspan="5" class="text-center text-danger">ডাটা লোড করতে ব্যর্থ!</td></tr>';
        }
    }

    // এডিট মোডাল ওপেন
    function openEditModal(id) {
        const m = allMembers.find(item => item.memberId == id);
        if (m) {
            let phoneVal = m.phone.toString();
            if (phoneVal.length === 10) phoneVal = "0" + phoneVal;

            document.getElementById('editId').value = m.memberId;
            document.getElementById('editName').value = m.name;
            document.getElementById('editPhone').value = phoneVal;
            document.getElementById('editPass').value = m.password || '';
            document.getElementById('editAddress').value = m.address || '';
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }
    }

    // এডিট ফর্ম সাবমিট
    document.getElementById('editForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> প্রসেসিং...';

        const fd = new FormData(this);
        fd.append('action', 'updateMember');

        fetch(scriptURL, { method: 'POST', body: fd })
        .then(() => {
            alert("সফলভাবে তথ্য আপডেট করা হয়েছে!");
            location.reload();
        })
        .catch(() => {
            alert("ত্রুটি হয়েছে! আবার চেষ্টা করুন।");
            btn.disabled = false;
            btn.innerText = "আপডেট করুন";
        });
    };

    // ডিলিট ফাংশন
    async function deleteMember(id) {
        if(confirm("আপনি কি নিশ্চিতভাবে আইডি #" + id + " ডিলিট করতে চান?")) {
            const fd = new FormData();
            fd.append('action', 'deleteMember');
            fd.append('memberId', id);

            fetch(scriptURL, { method: 'POST', body: fd })
            .then(() => {
                alert("সদস্য ডিলিট করা হয়েছে!");
                location.reload();
            })
            .catch(() => alert("ত্রুটি হয়েছে!"));
        }
    }

    window.onload = loadMembers;
</script>
</body>
</html>
