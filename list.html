<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>সদস্য তালিকা - বন্ধু কল্যাণ সংস্থা</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f4f8; }
        .table-container { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .thead-dark { background-color: #084382; color: white; }
        .btn-action { width: 38px; height: 38px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; border: none; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary">সদস্য তালিকা</h2>
        <a href="dashboard.html" class="btn btn-dark rounded-pill px-4">ড্যাশবোর্ড</a>
    </div>

    <div class="table-container table-responsive">
        <table class="table table-hover align-middle">
            <thead class="thead-dark">
                <tr>
                    <th class="ps-3">আইডি</th>
                    <th>নাম</th>
                    <th>মোবাইল</th>
                    <th>জমাকৃত টাকা</th>
                    <th class="text-center">অ্যাকশন</th>
                </tr>
            </thead>
            <tbody id="memberTableBody">
                <tr><td colspan="5" class="text-center py-5">লোড হচ্ছে...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content" style="border-radius: 20px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">তথ্য সংশোধন করুন</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="editForm">
                    <input type="hidden" id="editId" name="memberId">
                    <div class="mb-3">
                        <label class="form-label fw-bold">নাম</label>
                        <input type="text" id="editName" name="name" class="form-control rounded-3" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">মোবাইল</label>
                        <input type="text" id="editPhone" name="phone" class="form-control rounded-3" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">পাসওয়ার্ড</label>
                        <input type="text" id="editPass" name="password" class="form-control rounded-3" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">ঠিকানা</label>
                        <textarea id="editAddress" name="address" class="form-control rounded-3" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow" id="saveBtn">আপডেট করুন</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycby-laXDPDG5io4Jitg6cgBrS6jZ5jhHdne-VbNxPalAldjki8J-clh62KmHU1Xw3jS1hA/exec';
    let allMembers = [];

    async function loadMembers() {
        try {
            const response = await fetch(scriptURL);
            allMembers = await response.json();
            const tbody = document.getElementById('memberTableBody');
            tbody.innerHTML = '';

            allMembers.forEach(m => {
                tbody.innerHTML += `
                    <tr>
                        <td class="ps-3 fw-bold">#${m.memberId}</td>
                        <td>${m.name}</td>
                        <td>${m.phone}</td>
                        <td class="text-success fw-bold">৳ ${m.deposit}</td>
                        <td class="text-center">
                            <button onclick="openEditModal('${m.memberId}')" class="btn-action btn-primary me-2"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteMember('${m.memberId}')" class="btn-action btn-danger"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>`;
            });
        } catch (e) { alert("ডাটা লোড করতে সমস্যা হয়েছে!"); }
    }

    function openEditModal(id) {
        const m = allMembers.find(item => item.memberId == id);
        if (m) {
            document.getElementById('editId').value = m.memberId;
            document.getElementById('editName').value = m.name;
            document.getElementById('editPhone').value = m.phone;
            document.getElementById('editPass').value = m.password;
            document.getElementById('editAddress').value = m.address || '';
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }
    }

    document.getElementById('editForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.innerText = "প্রসেসিং...";

        const fd = new FormData(this);
        fd.append('action', 'updateMember');

        fetch(scriptURL, { method: 'POST', body: fd })
        .then(() => { alert("সফলভাবে আপডেট হয়েছে!"); location.reload(); })
        .catch(() => { alert("ভুল হয়েছে!"); btn.disabled = false; btn.innerText = "আপডেট করুন"; });
    };

    async function deleteMember(id) {
        if(confirm("আপনি কি নিশ্চিতভাবে আইডি #" + id + " ডিলিট করতে চান?")) {
            const fd = new FormData();
            fd.append('action', 'deleteMember');
            fd.append('memberId', id);

            fetch(scriptURL, { method: 'POST', body: fd })
            .then(() => { alert("ডিলিট হয়েছে!"); location.reload(); })
            .catch(() => alert("ত্রুটি!"));
        }
    }

    window.onload = loadMembers;
</script>
</body>
</html>
