<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ড্যাশবোর্ড - বন্ধু কল্যাণ সংস্থা</title>
    <script>
        if (localStorage.getItem('adminLoggedIn') !== 'true') window.location.replace("index.html");
        window.history.forward();
        function noBack() { window.history.forward(); }
    </script>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .header-section { background: linear-gradient(180deg, #084382 0%, #1b9cfc 100%); color: white; padding: 50px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .search-input { border-radius: 12px; padding: 15px; border: none; box-shadow: 0 8px 25px rgba(0,0,0,0.1); margin-top: -30px; }
        .menu-card { background: white; border-radius: 18px; padding: 25px; text-align: center; text-decoration: none; display: block; transition: 0.3s; border: 1px solid #eee; }
        .menu-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .menu-icon { font-size: 2.5rem; margin-bottom: 10px; color: #084382; }
        #suggestion-box { background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; position: absolute; width: 100%; z-index: 1000; margin-top: 5px; }
        .suggestion-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body onload="noBack();">
<div class="header-section shadow-sm">
    <h2 class="fw-bold">অ্যাডমিন প্যানেল</h2>
    <p class="opacity-75">বন্ধু কল্যাণ সংস্থা</p>
</div>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 position-relative">
            <input type="text" id="memberSearch" class="form-control search-input" placeholder="সদস্যের নাম বা আইডি দিয়ে সার্চ করুন...">
            <div id="suggestion-box"></div>
        </div>
    </div>
</div>
<div class="container mt-5 pb-5">
    <div class="row g-3">
        <div class="col-6 col-md-3"><a href="list.html" class="menu-card"><i class="fas fa-users menu-icon"></i><br><span class="fw-bold text-dark">সদস্য তালিকা</span></a></div>
        <div class="col-6 col-md-3"><a href="payment.html" class="menu-card"><i class="fas fa-hand-holding-usd menu-icon text-success"></i><br><span class="fw-bold text-dark">টাকা জমা নিন</span></a></div>
        <div class="col-6 col-md-3"><a href="add-member.html" class="menu-card"><i class="fas fa-user-plus menu-icon text-warning"></i><br><span class="fw-bold text-dark">নতুন সদস্য</span></a></div>
        <div class="col-6 col-md-3"><a href="#" onclick="logout()" class="menu-card"><i class="fas fa-power-off menu-icon text-danger"></i><br><span class="fw-bold text-danger">লগআউট</span></a></div>
    </div>
</div>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz2lZ6KwOU2ek7Kyk7E1ugj1hAnNpeoG3ti0eBAl5QoIHWGYY1r21_8UVoQ8yCfpXa1-Q/exec';
    let members = [];
    async function fetchMembers() {
        try { const r = await fetch(scriptURL); members = await r.json(); } catch(e) { console.log("Error"); }
    }
    document.getElementById('memberSearch').addEventListener('input', function() {
        const val = this.value.toLowerCase();
        const box = document.getElementById('suggestion-box');
        box.innerHTML = '';
        if(!val) { box.style.display='none'; return; }
        const filtered = members.filter(m => m.name.toLowerCase().includes(val) || m.memberId.toString().includes(val));
        if(filtered.length > 0) {
            filtered.forEach(m => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `<strong>${m.memberId}</strong> - ${m.name}`;
                div.onclick = () => window.location.href = `list.html?search=${m.memberId}`;
                box.appendChild(div);
            });
            box.style.display = 'block';
        }
    });
    function logout() { if(confirm("লগআউট করবেন?")) { localStorage.clear(); window.location.replace("index.html"); } }
    window.onload = fetchMembers;
</script>
</body>
</html>
