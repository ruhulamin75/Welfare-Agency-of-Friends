<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ড্যাশবোর্ড - বন্ধু কল্যাণ সংস্থা</title>
    
    <script>
        // ১. সিকিউরিটি চেক
        if (localStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.replace("index.html");
        }
        window.history.forward();
        function noBack() { window.history.forward(); }
    </script>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #084382; --accent: #74dc2c; --bg: #f0f4f8; }
        body { font-family: 'Hind Siliguri', sans-serif; background-color: var(--bg); margin: 0; }
        
        /* হেডার ডিজাইন */
        .header-section {
            background: linear-gradient(135deg, var(--primary) 0%, #1b9cfc 100%);
            color: white; padding: 50px 20px 90px;
            border-bottom-left-radius: 50px; border-bottom-right-radius: 50px;
            text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* সার্চ বক্স */
        .search-container { margin-top: -45px; position: relative; z-index: 1000; }
        .search-input {
            border-radius: 20px; padding: 18px 25px; border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); font-size: 1.1rem;
        }
        
        #suggestion-box {
            position: absolute; width: 100%; background: white;
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none; z-index: 999; margin-top: 8px;
            max-height: 220px; overflow-y: auto;
        }
        .suggestion-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #eee; transition: 0.2s; }
        .suggestion-item:hover { background: #f8f9fa; color: var(--primary); }

        /* প্রোফাইল কার্ড ডিজাইন */
        .profile-card {
            background: white; border-radius: 30px; border: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden;
            margin-top: 30px; display: none; border-top: 8px solid var(--accent);
        }
        .profile-header { background: #f8fbff; padding: 25px; border-bottom: 1px solid #f0f4f8; }
        .info-label { color: #888; font-size: 0.85rem; font-weight: 600; text-uppercase: uppercase; }
        .info-value { color: #333; font-weight: 700; font-size: 1.1rem; }

        /* মেনু গ্রিড */
        .menu-grid { margin-top: 40px; }
        .menu-item {
            background: white; border-radius: 25px; padding: 25px;
            text-align: center; text-decoration: none; display: block;
            transition: 0.3s; border: 1px solid #eee; box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        .menu-item:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .menu-icon { font-size: 2.5rem; margin-bottom: 12px; }
    </style>
</head>
<body>

<div class="header-section">
    <div class="container">
        <h2 class="fw-bold">অ্যাডমিন কন্ট্রোল প্যানেল</h2>
        <p class="opacity-75">বন্ধু কল্যাণ সংস্থা | ডিজিটাল ম্যানেজমেন্ট</p>
    </div>
</div>

<div class="container search-container">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-10 position-relative">
            <input type="text" id="memberSearch" class="form-control search-input" placeholder="সদস্যের নাম বা আইডি লিখুন..." autocomplete="off">
            <div id="suggestion-box"></div>
            
            <div id="profileCard" class="profile-card animate__animated animate__fadeIn">
                <div class="profile-header text-center">
                    <h4 id="cardName" class="fw-bold text-dark mb-1">সদস্যের নাম</h4>
                    <span class="badge bg-primary rounded-pill px-3">আইডি: <span id="cardID">--</span></span>
                </div>
                <div class="card-body p-4">
                    <div class="row g-4">
                        <div class="col-6 col-md-4">
                            <div class="info-label">মোবাইল নম্বর</div>
                            <div id="cardPhone" class="info-value text-primary">--</div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="info-label">পাসওয়ার্ড</div>
                            <div id="cardPass" class="info-value text-danger">--</div>
                        </div>
                        <div class="col-12 col-md-4">
                            <div class="info-label">মোট জমা</div>
                            <div id="cardDeposit" class="info-value text-success">৳ --</div>
                        </div>
                        <div class="col-6 col-md-6">
                            <div class="info-label">শেষ জমার তারিখ</div>
                            <div id="cardLastDate" class="info-value">--</div>
                        </div>
                        <div class="col-6 col-md-6">
                            <div class="info-label">বর্তমান ঠিকানা</div>
                            <div id="cardAddress" class="info-value" style="font-size: 0.95rem;">--</div>
                        </div>
                    </div>
                    <hr class="my-4 opacity-50">
                    <div class="row g-2">
                        <div class="col-6">
                            <button id="editBtn" class="btn btn-primary w-100 rounded-pill fw-bold py-2 shadow-sm"><i class="fas fa-edit me-2"></i>এডিট</button>
                        </div>
                        <div class="col-6">
                            <button id="deleteBtn" class="btn btn-outline-danger w-100 rounded-pill fw-bold py-2"><i class="fas fa-trash-alt me-2"></i>ডিলিট</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container menu-grid pb-5">
    <div class="row g-4">
        <div class="col-6 col-md-3"><a href="list.html" class="menu-item"><i class="fas fa-users-cog menu-icon text-primary"></i><br><span class="fw-bold text-dark">সদস্য তালিকা</span></a></div>
        <div class="col-6 col-md-3"><a href="payment.html" class="menu-item"><i class="fas fa-hand-holding-usd menu-icon text-success"></i><br><span class="fw-bold text-dark">টাকা জমা নিন</span></a></div>
        <div class="col-6 col-md-3"><a href="add-member.html" class="menu-item"><i class="fas fa-user-plus menu-icon text-warning"></i><br><span class="fw-bold text-dark">নতুন সদস্য</span></a></div>
        <div class="col-6 col-md-3"><a href="#" onclick="logout()" class="menu-item"><i class="fas fa-power-off menu-icon text-danger"></i><br><span class="fw-bold text-danger">লগআউট</span></a></div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycby-laXDPDG5io4Jitg6cgBrS6jZ5jhHdne-VbNxPalAldjki8J-clh62KmHU1Xw3jS1hA/exec';
    let members = [];

    async function fetchMembers() {
        try {
            const response = await fetch(scriptURL);
            members = await response.json();
        } catch (e) { console.error("Error fetching data"); }
    }

    const searchInput = document.getElementById('memberSearch');
    const suggestionBox = document.getElementById('suggestion-box');
    const profileCard = document.getElementById('profileCard');

    searchInput.addEventListener('input', function() {
        const val = this.value.trim().toLowerCase();
        suggestionBox.innerHTML = '';
        profileCard.style.display = 'none'; // নতুন সার্চ শুরু হলে কার্ড হাইড হবে

        if (!val) { suggestionBox.style.display = 'none'; return; }

        const filtered = members.filter(m => m.name.toLowerCase().includes(val) || m.memberId.toString().includes(val));

        if (filtered.length > 0) {
            filtered.forEach(m => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `<strong>${m.memberId}</strong> - ${m.name}`;
                div.onclick = () => {
                    displayProfile(m);
                    suggestionBox.style.display = 'none';
                    searchInput.value = m.name;
                };
                suggestionBox.appendChild(div);
            });
            suggestionBox.style.display = 'block';
        }
    });

    function displayProfile(m) {
        // মোবাইল নম্বরে '0' নিশ্চিত করা
        let phone = m.phone.toString();
        if (phone.length === 10) phone = "0" + phone;

        document.getElementById('cardName').innerText = m.name;
        document.getElementById('cardID').innerText = m.memberId;
        document.getElementById('cardPhone').innerText = phone;
        document.getElementById('cardPass').innerText = m.password || 'N/A';
        document.getElementById('cardDeposit').innerText = "৳ " + m.deposit;
        document.getElementById('cardAddress').innerText = m.address || 'তথ্য নেই';
        
        // তারিখ ফরম্যাটিং
        let lastDate = m['Last Date'] || 'নেই';
        if (lastDate !== 'নেই') {
            lastDate = new Date(lastDate).toLocaleDateString('bn-BD');
        }
        document.getElementById('cardLastDate').innerText = lastDate;

        // বাটন ফাংশন
        document.getElementById('editBtn').onclick = () => window.location.href = `list.html?id=${m.memberId}`; // লিস্ট পেজ থেকে এডিট হবে
        document.getElementById('deleteBtn').onclick = () => deleteMember(m.memberId);

        profileCard.style.display = 'block';
    }

    async function deleteMember(id) {
        if(confirm("আপনি কি নিশ্চিতভাবে এই সদস্যকে ডিলিট করতে চান?")) {
            const fd = new FormData();
            fd.append('action', 'deleteMember');
            fd.append('memberId', id);
            fetch(scriptURL, { method: 'POST', body: fd })
            .then(() => { alert("সদস্য ডিলিট হয়েছে!"); location.reload(); });
        }
    }

    function logout() {
        if(confirm("লগআউট করবেন?")) {
            localStorage.clear();
            window.location.replace("index.html");
        }
    }

    window.onload = fetchMembers;
</script>
</body>
</html>
